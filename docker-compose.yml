version: "3.9"

services:
  backend:
    build: .
    volumes:
      - .:/app
    ports:
      - 5000:5000
    env_file: .env
    environment:
      MONGODB_DATABASE: algebraic_predictor
    command: flask run --host 0.0.0.0
    depends_on:
      - db

  db:
    image: mongo:6.0.3
    env_file: .env
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: strong_password
      MONGO_INITDB_DATABASE: algebraic_predictor
    ports:
      - 27017:27017
    volumes:
      - mongo-data:/data/db
      - mongo-config:/data/configdb
    command: mongod --auth

volumes:
  mongo-data:
  mongo-config:
